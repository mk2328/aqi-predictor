name: Inference Pipeline

on:
  workflow_run:
    workflows: ["Feature Pipeline"]
    types: [completed]
  schedule:
    - cron: "30 * * * *"
  workflow_dispatch:

jobs:
  run-inference:
    runs-on: ubuntu-latest
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download models from Supabase Storage
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          mkdir -p models
          python - <<'EOF'
          import os, requests

          base_url = f"{os.environ['SUPABASE_URL']}/storage/v1/object/public/models"
          
          files = [
              ("best_model.pkl",   "models/best_model.pkl"),
              ("scaler.pkl",       "models/scaler.pkl"),
              ("feature_cols.json","models/feature_cols.json"),
          ]
          
          for storage_name, local_path in files:
              url = f"{base_url}/{storage_name}"
              r = requests.get(url, timeout=30)
              if r.status_code == 200:
                  with open(local_path, "wb") as f:
                      f.write(r.content)
                  print(f"✅ Downloaded {storage_name}")
              else:
                  print(f"❌ Failed to download {storage_name}: {r.status_code}")
          EOF

      - name: Run Inference Pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python pipelines/inference_pipeline.py